<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #1e2a38;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        img {
            width: 100px;
            border-radius: 50%;
        }

        h2 {
            margin: 10px 0;
        }

        .info {
            text-align: left;
            margin-top: 15px;
        }

        .info p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://via.placeholder.com/100" alt="Profile">
    <h2>Your Name</h2>
    <p>Student Profile</p>

    <div class="info">
        <p><strong>Full Name:</strong> Your Name</p>
        <p><strong>Address:</strong> Your Address</p>
        <p><strong>Course:</strong> BSIT</p>
    </div>
</div>

</body>
</html>
